name: Bug report
description: Report something broken in VLC RPC
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Open VLC RPC
        2. Play ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: VLC RPC version
      placeholder: v3.2
  - type: input
    id: media_filename
    attributes:
      label: Media filename
      placeholder: One Piece 1170.mp4
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add screenshots, AniList logs, or any console output.

